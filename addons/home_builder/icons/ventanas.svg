<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C2E6F5" />
      <stop offset="100%" stop-color="#8FCDE6" />
    </linearGradient>
  </defs>
  <!-- Marco exterior -->
  <rect x="4" y="6" width="24" height="20" rx="2" fill="#E0E0E0" stroke="#B0B0B0" stroke-width="1" />
  <!-- Cristal -->
  <rect x="7" y="9" width="18" height="14" rx="1" fill="url(#glassGrad)" stroke="#7FB8D0" stroke-width="0.8" />
  <!-- Reflejo de luz -->
  <polygon points="7,9 12,9 7,16" fill="white" opacity="0.4" />
  <line x1="7" y1="18" x2="10" y2="23" stroke="white" stroke-width="1.5" opacity="0.3" />
  <!-- Parteluz (cruz interior) -->
  <line x1="16" y1="9" x2="16" y2="23" stroke="#E0E0E0" stroke-width="2" />
  <line x1="7" y1="16" x2="25" y2="16" stroke="#E0E0E0" stroke-width="2" />
  <!-- Sombras de marco -->
  <rect x="4" y="6" width="24" height="3" rx="1" fill="black" opacity="0.1" />
</svg>