<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="brickGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D67562" />
      <stop offset="100%" stop-color="#B24A38" />
    </linearGradient>
  </defs>
  <!-- Fondo de pared -->
  <rect x="4" y="4" width="24" height="24" rx="2" fill="url(#brickGrad)" stroke="#8B3A2A" stroke-width="1.5" />
  <!-- Líneas de mortero horizontales -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="4" y1="16" x2="28" y2="16" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="4" y1="22" x2="28" y2="22" stroke="#E8DCC8" stroke-width="1.2" />
  <!-- Líneas verticales (patrón de ladrillo) -->
  <line x1="10" y1="4" x2="10" y2="10" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="20" y1="4" x2="20" y2="10" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="6" y1="10" x2="6" y2="16" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="16" y1="10" x2="16" y2="16" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="26" y1="10" x2="26" y2="16" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="10" y1="16" x2="10" y2="22" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="20" y1="16" x2="20" y2="22" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="6" y1="22" x2="6" y2="28" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="16" y1="22" x2="16" y2="28" stroke="#E8DCC8" stroke-width="1.2" />
  <line x1="26" y1="22" x2="26" y2="28" stroke="#E8DCC8" stroke-width="1.2" />
  <!-- Brillo sutil -->
  <rect x="4" y="4" width="24" height="8" rx="2" fill="white" opacity="0.15" />
</svg>