<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Gradiente peldaños -->
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6C29A"/>
      <stop offset="100%" stop-color="#B57A4F"/>
    </linearGradient>

    <!-- Gradiente barandilla -->
    <linearGradient id="railGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B0BAC5"/>
      <stop offset="100%" stop-color="#6F7C88"/>
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect x="4" y="4" width="24" height="24" rx="4" fill="#F1F4F6"/>

  <!-- Grupo con sombra -->
  <g filter="url(#shadow)">
    <!-- Barandilla izquierda -->
    <line x1="9" y1="6" x2="9" y2="26"
          stroke="url(#railGrad)"
          stroke-width="2"
          stroke-linecap="round"/>
    <!-- Barandilla derecha -->
    <line x1="23" y1="6" x2="23" y2="26"
          stroke="url(#railGrad)"
          stroke-width="1.8"
          stroke-linecap="round"
          opacity="0.8"/>

    <!-- Peldaños -->
    <rect x="9" y="22" width="14" height="3.5" rx="1"
          fill="url(#stepGrad)"/>

    <rect x="9" y="17.5" width="12" height="3.5" rx="1"
          fill="url(#stepGrad)"/>

    <rect x="9" y="13" width="10" height="3.5" rx="1"
          fill="url(#stepGrad)"/>

    <rect x="9" y="8.5" width="8" height="3.5" rx="1"
          fill="url(#stepGrad)"/>
  </g>

  <!-- Luz superior -->
  <rect x="4" y="4" width="24" height="10" rx="4"
        fill="white" opacity="0.15"/>
</svg>