<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97A2B" />
      <stop offset="100%" stop-color="#A3470F" />
    </linearGradient>
  </defs>
  <!-- Forma de tejado a dos aguas -->
  <polygon points="4,18 16,4 28,18" fill="url(#roofGrad)" stroke="#7A330A" stroke-width="1.5" stroke-linejoin="round" />
  <!-- Borde inferior del tejado -->
  <line x1="4" y1="18" x2="28" y2="18" stroke="#7A330A" stroke-width="2" stroke-linecap="round" />
  <!-- Brillo -->
  <polygon points="4,18 16,4 28,18" fill="white" opacity="0.1" />
</svg>